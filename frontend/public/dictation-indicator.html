<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dictation</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    height: 100%;
    user-select: none;
    cursor: default;
  }
  .pill {
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 36px;
    margin: 2px;
    padding: 0 14px 0 12px;
    border-radius: 999px;
    background: rgba(24, 24, 28, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.12);
    width: fit-content;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.92);
    letter-spacing: 0.01em;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #f43f5e;
    flex-shrink: 0;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.55); }
    50% { opacity: 0.75; transform: scale(0.85); box-shadow: 0 0 0 5px rgba(244, 63, 94, 0); }
  }
</style>
</head>
<body>
  <div class="pill"><span class="dot"></span>Dictating</div>
</body>
</html>
