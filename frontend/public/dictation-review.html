<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dictation review</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .card {
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 2px;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(24, 24, 28, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.92);
    height: calc(100% - 4px);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }
  .label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 2px;
  }
  .original {
    font-size: 13px;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.55);
    max-height: 40px;
    overflow-y: auto;
    unicode-bidi: plaintext;
  }
  textarea {
    box-sizing: border-box;
    width: 100%;
    flex: 1;
    min-height: 44px;
    resize: none;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.95);
    font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 6px 8px;
    outline: none;
    unicode-bidi: plaintext;
  }
  textarea:focus { border-color: rgba(96, 165, 250, 0.7); }
  .buttons {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  button {
    flex: 1;
    height: 30px;
    border-radius: 8px;
    border: none;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .accept { background: #2563eb; color: white; }
  .accept:hover { background: #1d4ed8; }
  .reject { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.85); }
  .reject:hover { background: rgba(255, 255, 255, 0.18); }
  .countdown {
    height: 3px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.12);
    overflow: hidden;
  }
  .countdown > div {
    height: 100%;
    background: #60a5fa;
    width: 100%;
    transition: width 120ms linear;
  }
  .empty-note {
    font-size: 12px;
    color: #fbbf24;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span>Dictation cleanup</span>
      <span id="hint" style="text-transform:none;font-weight:400">auto-accepts…</span>
    </div>
    <div>
      <div class="label">Original</div>
      <div class="original" dir="auto" id="original"></div>
    </div>
    <div style="display:flex;flex-direction:column;flex:1;min-height:0">
      <div class="label">Cleaned (editable)</div>
      <textarea id="cleaned" dir="auto" spellcheck="false"></textarea>
      <div class="empty-note" id="emptyNote" style="display:none">Cleanup removed this segment as filler — Accept drops it, Reject keeps the original.</div>
    </div>
    <div class="countdown"><div id="bar"></div></div>
    <div class="buttons">
      <button class="reject" id="reject" title="Type the original text unchanged">Reject</button>
      <button class="accept" id="accept" title="Type the cleaned text (with your edits)">Accept</button>
    </div>
  </div>

<script>
  const { listen } = window.__TAURI__.event;
  const { invoke } = window.__TAURI__.core;

  const original = document.getElementById('original');
  const cleaned = document.getElementById('cleaned');
  const emptyNote = document.getElementById('emptyNote');
  const bar = document.getElementById('bar');
  const hint = document.getElementById('hint');

  let currentId = null;
  let timer = null;
  let deadline = 0;
  let paused = false;

  function stopCountdown(showPausedHint) {
    paused = true;
    if (timer) { clearInterval(timer); timer = null; }
    bar.style.width = '100%';
    bar.style.background = 'rgba(255,255,255,0.25)';
    if (showPausedHint) hint.textContent = 'waiting for you';
  }

  function startCountdown(ms) {
    paused = false;
    bar.style.background = '#60a5fa';
    deadline = Date.now() + ms;
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
      const left = deadline - Date.now();
      if (left <= 0) {
        decide(true);
        return;
      }
      bar.style.width = (left / ms * 100) + '%';
    }, 120);
    hint.textContent = 'auto-accepts…';
  }

  function decide(accepted) {
    if (currentId === null) return;
    const id = currentId;
    currentId = null;
    if (timer) { clearInterval(timer); timer = null; }
    invoke('dictation_review_decision', {
      id,
      accepted,
      text: accepted ? cleaned.value : null,
    }).catch(() => {});
  }

  // Any interaction hands control to the user: stop the auto-accept clock.
  ['mousedown', 'input', 'focusin'].forEach((ev) =>
    document.addEventListener(ev, () => { if (!paused) stopCountdown(true); }),
  );
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) decide(true);
    if (e.key === 'Escape') decide(false);
  });

  document.getElementById('accept').addEventListener('click', () => decide(true));
  document.getElementById('reject').addEventListener('click', () => decide(false));

  listen('dictation-review', (event) => {
    const { id, original: orig, cleaned: clean, timeout_ms } = event.payload;
    currentId = id;
    original.textContent = orig;
    cleaned.value = clean;
    emptyNote.style.display = clean.trim() === '' ? '' : 'none';
    startCountdown(timeout_ms ?? 8000);
  });
</script>
</body>
</html>
